<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — VulnScanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 24px;
            color: #00ff88;
            font-weight: 700;
        }

        .logo p {
            color: #555;
            font-size: 13px;
            margin-top: 4px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        .field input:focus {
            border-color: #00ff88;
        }

        .login-btn {
            width: 100%;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #00cc6a;
        }

        .error {
            background: #2a0000;
            border: 1px solid #ff2222;
            border-radius: 8px;
            padding: 10px 14px;
            color: #ff6666;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }

        .hint {
            text-align: center;
            color: #333;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>&#x1F6E1; VulnScanner</h1>
            <p>Web Vulnerability Scanner</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <div class="field">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" />
        </div>

        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" />
        </div>

        <button class="login-btn" onclick="doLogin()">Login</button>

        <p class="hint">Authorized users only</p>
    </div>

    <script>
    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            alert('Please enter username and password');
            return;
        }

        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
            window.location.href = '/';
        } else {
            document.body.innerHTML = document.body.innerHTML;
            location.reload();
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin();
    });
    </script>
</body>
</html>
